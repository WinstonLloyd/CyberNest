<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: #000;
            color: #00ff00;
            font-family: 'Courier New', monospace;
        }
        
        .terminal {
            background: #0a0a0a;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 
                0 0 20px rgba(0, 255, 0, 0.3),
                inset 0 0 10px rgba(0, 255, 0, 0.1),
                0 0 40px rgba(0, 255, 0, 0.2);
            border: 2px solid #00ff00;
            position: relative;
            overflow: hidden;
        }
        
        .terminal::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(45deg, 
                transparent 30%, 
                rgba(0, 255, 0, 0.03) 50%, 
                transparent 70%);
            animation: terminal-scan 3s linear infinite;
            pointer-events: none;
        }
        
        .terminal::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, 
                transparent 0%, 
                rgba(0, 255, 0, 0.05) 50%, 
                transparent 100%);
            width: 2px;
            animation: terminal-scan-vertical 2s linear infinite;
            pointer-events: none;
        }
        
        .terminal-input {
            background: transparent;
            border: none;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            outline: none;
            padding: 8px;
            border-radius: 4px;
            text-shadow: 0 0 5px rgba(0, 255, 0, 0.5);
        }
        
        .terminal-output {
            white-space: pre-wrap;
            word-wrap: break-word;
            padding: 10px;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 4px;
            margin: 10px 0;
            border: 1px solid #00ff00;
        }
        
        /* Terminal output scrollbar styling */
        .terminal-output::-webkit-scrollbar {
            width: 8px;
        }
        
        .terminal-output::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.8);
            border-radius: 4px;
        }
        
        .terminal-output::-webkit-scrollbar-thumb {
            background: #00ff00;
            border-radius: 4px;
            box-shadow: 0 0 5px rgba(0, 255, 0, 0.3);
        }
        
        .terminal-output::-webkit-scrollbar-thumb:hover {
            background: #00cc00;
        }
        
        .terminal-output::-moz-scrollbar {
            width: 8px;
        }
        
        .terminal-output::-moz-scrollbar-track {
            background: rgba(0, 0, 0, 0.8);
            border-radius: 4px;
        }
        
        .terminal-output::-moz-scrollbar-thumb {
            background: #00ff00;
            border-radius: 4px;
            box-shadow: 0 0 5px rgba(0, 255, 0, 0.3);
        }
        
        .terminal-output::-moz-scrollbar-thumb:hover {
            background: #00cc00;
        }
        
        .terminal-output::-ms-overflow-style {
            scrollbar-width: 8px;
        }
        
        .terminal-output::-ms-scrollbar-track {
            background: rgba(0, 0, 0, 0.8);
            border-radius: 4px;
        }
        
        .terminal-output::-ms-scrollbar-thumb {
            background: #00ff00;
            border-radius: 4px;
            box-shadow: 0 0 5px rgba(0, 255, 0, 0.3);
        }
        
        .terminal-output::-ms-scrollbar-thumb:hover {
            background: #00cc00;
        }
        
        .command-history {
            max-height: 400px;
            overflow-y: auto;
            padding: 15px;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 8px;
            margin: 10px 0;
            border: 1px solid #00ff00;
        }
        
        .fade-in {
            animation: fadeIn 0.3s ease-in;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .btn-terminal {
            background: linear-gradient(135deg, #00ff00 0%, #00cc00 100%);
            border: 1px solid #00ff00;
            color: #000000;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            padding: 10px 20px;
            border-radius: 6px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 0 5px rgba(0, 255, 0, 0.3);
        }
        
        .btn-terminal:hover {
            background: linear-gradient(135deg, #00ff00 0%, #00dd00 100%);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0, 255, 0, 0.5);
            color: #000000;
            text-shadow: 0 0 5px rgba(0, 255, 0, 0.5);
        }
        
        .btn-terminal:active {
            transform: translateY(0);
            box-shadow: 0 2px 10px rgba(0, 255, 0, 0.3);
            color: #000000;
            text-shadow: 0 0 5px rgba(0, 255, 0, 0.5);
        }
        
        .command-line {
            display: flex;
            align-items: center;
            margin: 5px 0;
        }
        
        .command-prompt {
            color: #00ff00;
            margin-right: 10px;
            font-weight: bold;
            text-shadow: 0 0 5px rgba(0, 255, 0, 0.5);
        }
        
        .command-text {
            color: #00ff00;
            flex: 1;
            text-shadow: 0 0 5px rgba(0, 255, 0, 0.5);
        }
        
        .cursor {
            display: inline-block;
            width: 10px;
            height: 20px;
            background: #00ff00;
            animation: blink 1s infinite;
        }
        
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }
        
        @keyframes terminal-scan {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }
        
        @keyframes terminal-scan-vertical {
            0% { height: 0%; }
            100% { height: 100%; }
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin: 0 2px;
        }
        
        /* Scrollbar styling */
        .command-history::-webkit-scrollbar {
            width: 8px;
        }
        
        .command-history::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.8);
            border-radius: 4px;
        }
        
        .command-history::-webkit-scrollbar-thumb {
            background: #00ff00;
            border-radius: 4px;
            box-shadow: 0 0 5px rgba(0, 255, 0, 0.3);
        }
        
        .command-history::-webkit-scrollbar-thumb:hover {
            background: #00cc00;
        }
        
        .command-history::-moz-scrollbar {
            width: 8px;
        }
        
        .command-history::-moz-scrollbar-track {
            background: rgba(0, 0, 0, 0.8);
            border-radius: 4px;
        }
        
        .command-history::-moz-scrollbar-thumb {
            background: #00ff00;
            border-radius: 4px;
            box-shadow: 0 0 5px rgba(0, 255, 0, 0.3);
        }
        
        .command-history::-moz-scrollbar-thumb:hover {
            background: #00cc00;
        }
        
        .command-history::-ms-overflow-style {
            scrollbar-width: 8px;
        }
        
        .command-history::-ms-scrollbar-track {
            background: rgba(0, 0, 0, 0.8);
            border-radius: 4px;
        }
        
        .command-history::-ms-scrollbar-thumb {
            background: #00ff00;
            border-radius: 4px;
            box-shadow: 0 0 5px rgba(0, 255, 0, 0.3);
        }
        
        .command-history::-ms-scrollbar-thumb:hover {
            background: #00cc00;
        }
        
        /* Hacker theme overrides */
        .bg-dark {
            background: #000 !important;
        }
        
        .text-white {
            color: #00ff00 !important;
        }
        
        .text-success {
            color: #00ff00 !important;
            text-shadow: 0 0 5px rgba(0, 255, 0, 0.5) !important;
        }
        
        .text-muted {
            color: #00ff00 !important;
            opacity: 0.7 !important;
        }
        
        .bg-black {
            background: #0a0a0a !important;
            border: 1px solid #00ff00 !important;
        }
        
        .border-success {
            border-color: #00ff00 !important;
        }
        
        .btn-outline-success {
            background: transparent !important;
            border: 1px solid #00ff00 !important;
            color: #00ff00 !important;
            text-shadow: 0 0 5px rgba(0, 255, 0, 0.5) !important;
        }
        
        .btn-outline-success:hover {
            background: rgba(0, 255, 0, 0.1) !important;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.5) !important;
            text-shadow: 0 0 5px rgba(0, 255, 0, 0.5) !important;
        }
        
        .btn-outline-danger {
            background: transparent !important;
            border: 1px solid #ff0000 !important;
            color: #ff0000 !important;
            text-shadow: 0 0 5px rgba(255, 0, 0, 0.5) !important;
        }
        
        .btn-outline-danger:hover {
            background: rgba(255, 0, 0, 0.1) !important;
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.5) !important;
            text-shadow: 0 0 5px rgba(255, 0, 0, 0.5) !important;
        }
        
        .bg-secondary {
            background: rgba(0, 20, 0, 0.9) !important;
            border-bottom: 1px solid #00ff00 !important;
        }
        
        .text-light {
            color: #00ff00 !important;
            text-shadow: 0 0 5px rgba(0, 255, 0, 0.5) !important;
        }
        
        /* Glitch effects for headers */
        .display-4 {
            animation: glitch 2s infinite !important;
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.8) !important;
        }
        
        @keyframes glitch {
            0%, 100% { text-shadow: 0 0 10px rgba(0, 255, 0, 0.8); }
            25% { text-shadow: -2px 0 10px rgba(255, 0, 0, 0.8); }
            50% { text-shadow: 2px 0 10px rgba(0, 255, 0, 0.8); }
            75% { text-shadow: 0 0 10px rgba(0, 255, 255, 0, 0.8); }
        }
        
        /* Matrix rain background effect */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 2px,
                    rgba(0, 255, 0, 0.03) 2px,
                    transparent 4px
                );
            pointer-events: none;
            z-index: 0;
            opacity: 0.1;
        }
    </style>
</head>
<body class="bg-dark text-white min-vh-100">
    <div class="container-fluid p-4">
        <!-- <header class="text-center mb-5">
            <h1 class="display-4 fw-bold text-success mb-3">
                <i class="fas fa-terminal me-3"></i>CYBERTERMINAL
            </h1>
            <p class="text-muted fs-5">Execute Linux commands from your browser</p>
        </header> -->

        <main class="row">
            <div class="col-lg-8">
                <!-- Terminal Section -->
                <section class="mb-4">
                    <div class="bg-black rounded shadow-lg">
                        <div class="bg-secondary px-4 py-2 rounded-top d-flex justify-content-between align-items-center">
                            <div class="d-flex align-items-center">
                                <div class="status-dot bg-danger me-2"></div>
                                <div class="status-dot bg-warning me-2"></div>
                                <div class="status-dot bg-success me-2"></div>
                            </div>
                            <span class="text-light small">Terminal</span>
                        </div>
                        
                        <div class="terminal p-4 rounded-bottom" style="min-height: 400px;">
                            <div id="output" class="terminal-output mb-3 command-history">
                                <div class="fade-in">Welcome to Linux Command Console!</div>
                                <div class="fade-in">Type 'help' for available commands.</div>
                                <div class="fade-in">----------------------------------------</div>
                            </div>
                            
                            <div class="input-group mb-3">
                                <span class="input-group-text bg-dark text-success border-0" id="prompt">$</span>
                                <input 
                                    type="text" 
                                    id="commandInput" 
                                    class="form-control terminal-input bg-dark text-success border-success"
                                    placeholder="Enter Linux command..."
                                    autocomplete="off"
                                >
                                <button class="btn btn-terminal" type="button" id="executeBtn">
                                    Execute
                                </button>
                            </div>
                        </div>
                    </div>
                </section>
            </div>
            
            <!-- Sidebar -->
            <aside class="col-lg-4">
                <!-- Quick Commands -->
                <section class="bg-black rounded p-4 mb-4 border border-success">
                    <h2 class="h5 text-success mb-4">
                        <i class="fas fa-bolt me-2"></i>Quick Commands
                    </h2>
                    <div class="d-grid gap-2">
                        <button class="btn btn-outline-success quick-cmd" data-cmd="ls -la">
                            <i class="fas fa-list me-2"></i>ls -la
                        </button>
                        <button class="btn btn-outline-success quick-cmd" data-cmd="pwd">
                            <i class="fas fa-folder me-2"></i>pwd
                        </button>
                        <button class="btn btn-outline-success quick-cmd" data-cmd="whoami">
                            <i class="fas fa-user me-2"></i>whoami
                        </button>
                        <button class="btn btn-outline-success quick-cmd" data-cmd="date">
                            <i class="fas fa-clock me-2"></i>date
                        </button>
                        <button class="btn btn-outline-success quick-cmd" data-cmd="uname -a">
                            <i class="fas fa-info-circle me-2"></i>uname -a
                        </button>
                    </div>
                </section>

                <!-- Command History -->
                <section class="bg-black rounded p-4 mb-4 border border-success">
                    <h2 class="h5 text-success mb-4">
                        <i class="fas fa-history me-2"></i>Command History
                    </h2>
                    <div id="history" class="text-success small" style="max-height: 200px; overflow-y: auto;">
                        <div class="text-muted">No commands yet...</div>
                    </div>
                    <button id="clearHistory" class="btn btn-outline-danger btn-sm mt-3 w-100">
                        Clear History
                    </button>
                </section>

                <!-- Info Panel -->
                <section class="bg-black rounded p-4 border border-success">
                    <h2 class="h5 text-success mb-4">
                        <i class="fas fa-info-circle me-2"></i>Info
                    </h2>
                    <div class="text-success">
                        <div class="d-flex justify-content-between mb-2">
                            <span class="text-muted">Commands Executed:</span>
                            <span id="commandCount">0</span>
                        </div>
                        <div class="d-flex justify-content-between">
                            <span class="text-muted">Status:</span>
                            <span id="status" class="text-success">Ready</span>
                        </div>
                    </div>
                </section>
            </aside>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../javascript/terminal.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const commandInput = document.getElementById('commandInput');
            const terminal = document.querySelector('.terminal');
            
            commandInput.addEventListener('focus', function() {
                terminal.style.boxShadow = '0 0 30px rgba(0, 255, 0, 0.5), inset 0 0 20px rgba(0, 255, 0, 0.1)';
            });
            
            commandInput.addEventListener('blur', function() {
                terminal.style.boxShadow = '0 0 20px rgba(0, 255, 0, 0.3), inset 0 0 10px rgba(0, 255, 0, 0.1)';
            });
            
            const quickCmds = document.querySelectorAll('.quick-cmd');
            quickCmds.forEach(btn => {
                btn.addEventListener('mouseenter', function() {
                    this.style.transform = 'translateX(5px)';
                    this.style.boxShadow = '0 4px 15px rgba(0, 255, 0, 0.3)';
                });
                
                btn.addEventListener('mouseleave', function() {
                    this.style.transform = 'translateX(0)';
                    this.style.boxShadow = 'none';
                });
                
                btn.addEventListener('click', function() {
                    const cmd = this.getAttribute('data-cmd');
                    commandInput.value = cmd;
                    commandInput.focus();
                    
                    this.classList.add('btn-success');
                    this.classList.remove('btn-outline-success');
                    setTimeout(() => {
                        this.classList.remove('btn-success');
                        this.classList.add('btn-outline-success');
                    }, 200);
                });
            });
            
            const executeBtn = document.getElementById('executeBtn');
            executeBtn.addEventListener('click', function() {
                this.style.transform = 'scale(0.95)';
                setTimeout(() => {
                    this.style.transform = 'scale(1)';
                }, 100);
            });
            
            const clearHistoryBtn = document.getElementById('clearHistory');
            clearHistoryBtn.addEventListener('click', function() {
                if (confirm('Are you sure you want to clear command history?')) {
                    document.getElementById('history').innerHTML = '<div class="text-muted">No commands yet...</div>';
                    this.textContent = 'Cleared!';
                    this.classList.add('btn-success');
                    this.classList.remove('btn-outline-danger');
                    setTimeout(() => {
                        this.textContent = 'Clear History';
                        this.classList.remove('btn-success');
                        this.classList.add('btn-outline-danger');
                    }, 1500);
                }
            });
            
            const statusElement = document.getElementById('status');
            function updateStatus(status) {
                statusElement.textContent = status;
                statusElement.style.animation = 'pulse 0.5s ease-in-out';
                setTimeout(() => {
                    statusElement.style.animation = '';
                }, 500);
            }
            
            let commandCount = 0;
            function incrementCommandCount() {
                commandCount++;
                const countElement = document.getElementById('commandCount');
                countElement.textContent = commandCount;
                countElement.style.animation = 'pulse 0.3s ease-in-out';
                setTimeout(() => {
                    countElement.style.animation = '';
                }, 300);
            }
            
            function handleResize() {
                const width = window.innerWidth;
                if (width < 768) {
                    terminal.style.fontSize = '12px';
                    commandInput.style.fontSize = '14px';
                } else if (width < 992) {
                    terminal.style.fontSize = '13px';
                    commandInput.style.fontSize = '15px';
                } else {
                    terminal.style.fontSize = '14px';
                    commandInput.style.fontSize = '16px';
                }
            }
            
            window.addEventListener('resize', handleResize);
            handleResize();
            
            document.addEventListener('keydown', function(e) {
                if (e.ctrlKey && e.key === 'l') {
                    e.preventDefault();
                    clearHistoryBtn.click();
                }
                if (e.ctrlKey && e.key === 'c') {
                    e.preventDefault();
                    commandInput.value = '';
                    commandInput.focus();
                }
            });
            
            function typeText(element, text, speed = 50) {
                let i = 0;
                element.textContent = '';
                function type() {
                    if (i < text.length) {
                        element.textContent += text.charAt(i);
                        i++;
                        setTimeout(type, speed);
                    }
                }
                type();
            }
            
            const style = document.createElement('style');
            style.textContent = `
                @keyframes pulse {
                    0% { transform: scale(1); }
                    50% { transform: scale(1.1); }
                    100% { transform: scale(1); }
                }
                
                .quick-cmd {
                    transition: all 0.3s ease;
                }
                
                .btn-terminal {
                    transition: all 0.1s ease;
                }
                
                @media (max-width: 767px) {
                    .container-fluid {
                        padding: 10px;
                    }
                    .terminal {
                        min-height: 300px !important;
                    }
                    .display-4 {
                        font-size: 2rem;
                    }
                }
                
                @media (max-width: 576px) {
                    .col-lg-4 {
                        margin-top: 20px;
                    }
                    .quick-cmd {
                        font-size: 0.8rem;
                        padding: 8px 12px;
                    }
                }
            `;
            document.head.appendChild(style);
        });
    </script>
</body>
</html>
