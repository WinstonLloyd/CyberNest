<!-- Add Challenge Modal Content -->
<div id="addChallengeModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
    <div class="bg-gray-900 border border-green-400 rounded-lg max-w-4xl w-full mx-4 max-h-[90vh] overflow-y-auto">
        <!-- Modal Header -->
        <div class="flex items-center justify-between p-6 border-b border-green-400">
            <h2 class="hacker-font text-xl font-semibold text-green-400">
                <i class="fas fa-plus-circle mr-2"></i>Create New Challenge
            </h2>
            <button onclick="closeAddChallengeModal()" class="text-gray-400 hover:text-white transition-colors">
                <i class="fas fa-times text-xl"></i>
            </button>
        </div>

        <!-- Modal Body -->
        <div class="p-6">
            <form id="addChallengeForm" class="space-y-6">
                <!-- Basic Information -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-green-400 mb-2">Challenge Name *</label>
                        <input type="text" id="challengeName" required
                            class="w-full px-3 py-2 bg-gray-800 border border-green-400 rounded-md text-green-400 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-green-400 focus:border-transparent"
                            placeholder="e.g., SQL Injection">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-green-400 mb-2">Challenge ID *</label>
                        <input type="text" id="challengeId" required
                            class="w-full px-3 py-2 bg-gray-800 border border-green-400 rounded-md text-green-400 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-green-400 focus:border-transparent"
                            placeholder="e.g., sql-injection">
                    </div>
                </div>

                <!-- Category and Difficulty -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-green-400 mb-2">Category *</label>
                        <select id="category" required
                            class="w-full px-3 py-2 bg-gray-800 border border-green-400 rounded-md text-green-400 focus:outline-none focus:ring-2 focus:ring-green-400 focus:border-transparent">
                            <option value="">Select Category</option>
                            <option value="web">Web</option>
                            <option value="crypto">Cryptography</option>
                            <option value="reverse">Reverse Engineering</option>
                            <option value="pwn">Pwn/Exploitation</option>
                            <option value="forensics">Forensics</option>
                            <option value="misc">Miscellaneous</option>
                        </select>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-green-400 mb-2">Difficulty *</label>
                        <select id="difficulty" required
                            class="w-full px-3 py-2 bg-gray-800 border border-green-400 rounded-md text-green-400 focus:outline-none focus:ring-2 focus:ring-green-400 focus:border-transparent">
                            <option value="">Select Difficulty</option>
                            <option value="easy">Easy</option>
                            <option value="medium">Medium</option>
                            <option value="hard">Hard</option>
                            <option value="extreme">Extreme</option>
                        </select>
                    </div>
                </div>

                <!-- Description -->
                <div>
                    <label class="block text-sm font-medium text-green-400 mb-2">Description *</label>
                    <textarea id="description" rows="4" required
                        class="w-full px-3 py-2 bg-gray-800 border border-green-400 rounded-md text-green-400 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-green-400 focus:border-transparent"
                        placeholder="Describe the challenge objectives and what users need to do..."></textarea>
                </div>

                <!-- Technical Details -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-green-400 mb-2">Tags (comma separated)</label>
                        <input type="text" id="tags"
                            class="w-full px-3 py-2 bg-gray-800 border border-green-400 rounded-md text-green-400 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-green-400 focus:border-transparent"
                            placeholder="e.g., web security, database, injection">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-green-400 mb-2">Terminal Command</label>
                        <input type="text" id="terminalCommand"
                            class="w-full px-3 py-2 bg-gray-800 border border-green-400 rounded-md text-green-400 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-green-400 focus:border-transparent"
                            placeholder="e.g., $ sqlmap -u target.com --dbs">
                    </div>
                </div>

                <!-- Points -->
                <div class="grid grid-cols-1 md:grid-cols-1 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-green-400 mb-2">Reward Points *</label>
                        <input type="number" id="points" min="0" required
                            class="w-full px-3 py-2 bg-gray-800 border border-green-400 rounded-md text-green-400 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-green-400 focus:border-transparent"
                            placeholder="e.g., 500">
                    </div>
                </div>

                <!-- Flag Information -->
                <div class="border-t border-green-400 pt-6">
                    <h3 class="hacker-font text-lg font-semibold text-green-400 mb-4">
                        <i class="fas fa-flag mr-2"></i>Flag Configuration
                    </h3>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-medium text-green-400 mb-2">Flag Format</label>
                            <select id="flagFormat"
                                class="w-full px-3 py-2 bg-gray-800 border border-green-400 rounded-md text-green-400 focus:outline-none focus:ring-2 focus:ring-green-400 focus:border-transparent">
                                <option value="flag{...}">flag{...}</option>
                                <option value="CTF{...}">CTF{...}</option>
                                <option value="FLAG{...}">FLAG{...}</option>
                                <option value="custom">Custom</option>
                            </select>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-green-400 mb-2">Flag Value</label>
                            <input type="text" id="flagValue"
                                class="w-full px-3 py-2 bg-gray-800 border border-green-400 rounded-md text-green-400 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-green-400 focus:border-transparent"
                                placeholder="e.g., flag{sql_master_2024}">
                        </div>
                    </div>
                </div>

                <!-- Hints -->
                <div class="border-t border-green-400 pt-6">
                    <h3 class="hacker-font text-lg font-semibold text-green-400 mb-4">
                        <i class="fas fa-lightbulb mr-2"></i>Hints (Optional)
                    </h3>
                    
                    <div id="hintsContainer" class="space-y-3">
                        <div class="hint-item flex gap-3">
                            <input type="text" class="hint-input flex-1 px-3 py-2 bg-gray-800 border border-green-400 rounded-md text-green-400 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-green-400 focus:border-transparent"
                                placeholder="Enter hint...">
                            <button type="button" onclick="removeHint(this)" class="px-3 py-2 bg-red-600 text-white rounded-md hover:bg-red-700 transition-colors">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                    
                    <button type="button" onclick="addHint()" class="px-4 py-2 bg-green-600 text-white rounded-md hover:bg-green-700 transition-colors">
                        <i class="fas fa-plus mr-2"></i>Add Hint
                    </button>
                </div>

                <!-- Files/Resources -->
                <div class="border-t border-green-400 pt-6">
                    <h3 class="hacker-font text-lg font-semibold text-green-400 mb-4">
                        <i class="fas fa-file mr-2"></i>Challenge Files (Optional)
                    </h3>
                    
                    <div id="filesContainer" class="space-y-3">
                        <div class="file-item flex gap-3">
                            <input type="text" class="file-name flex-1 px-3 py-2 bg-gray-800 border border-green-400 rounded-md text-green-400 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-green-400 focus:border-transparent"
                                placeholder="File name">
                            <input type="file" class="file-upload flex-1 px-3 py-2 bg-gray-800 border border-green-400 rounded-md text-green-400 file:mr-4 file:py-1 file:px-2 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-green-600 file:text-white hover:file:bg-green-700"
                                accept="image/*,.pdf,.txt,.zip,.tar.gz" onchange="handleFileSelect(this)">
                            <button type="button" onclick="removeFile(this)" class="px-3 py-2 bg-red-600 text-white rounded-md hover:bg-red-700 transition-colors">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                    
                    <button type="button" onclick="addFile()" class="px-4 py-2 bg-green-600 text-white rounded-md hover:bg-green-700 transition-colors">
                        <i class="fas fa-plus mr-2"></i>Add File
                    </button>
                </div>

                <!-- Submit Buttons -->
                <div class="border-t border-green-400 pt-6">
                    <div class="flex justify-end space-x-4">
                        <button type="button" onclick="resetForm()" class="px-6 py-2 bg-gray-600 text-white rounded-md hover:bg-gray-700 transition-colors">
                            <i class="fas fa-redo mr-2"></i>Reset
                        </button>
                        <button type="button" onclick="previewChallenge()" class="px-6 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 transition-colors">
                            <i class="fas fa-eye mr-2"></i>Preview
                        </button>
                        <button type="submit" class="px-6 py-2 bg-green-600 text-white rounded-md hover:bg-green-700 transition-colors">
                            <i class="fas fa-save mr-2"></i>Create Challenge
                        </button>
                    </div>
                </div>
            </form>
        </div>

        <!-- Preview Section (Hidden by default) -->
        <div id="previewSection" class="hidden border-t border-green-400">
            <div class="p-6">
                <h3 class="hacker-font text-lg font-semibold text-green-400 mb-4">
                    <i class="fas fa-eye mr-2"></i>Challenge Preview
                </h3>
                <div id="previewContent"></div>
            </div>
        </div>
    </div>
</div>
