<script>
function logout() {
    if (confirm('Are you sure you want to logout?')) {
        window.location.href = '../index.html';
    }
}

// Update system status periodically
setInterval(() => {
    const cpuProgress = document.querySelector('.status-progress.cpu');
    const memoryProgress = document.querySelector('.status-progress.memory');
    const diskProgress = document.querySelector('.status-progress.disk');
    
    if (cpuProgress) {
        const newCpu = 30 + Math.floor(Math.random() * 20);
        cpuProgress.style.width = newCpu + '%';
        cpuProgress.nextElementSibling.textContent = newCpu + '%';
    }
    
    if (memoryProgress) {
        const newMemory = 60 + Math.floor(Math.random() * 15);
        memoryProgress.style.width = newMemory + '%';
        memoryProgress.nextElementSibling.textContent = newMemory + '%';
    }
}, 5000);
</script>
